<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 당유찬 여름방학 일정</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: linear-gradient(135deg, #eef8ff 0%, #fff9e8 100%);
      color: #1f2937;
    }

    .wrap {
      max-width: 1500px;
      margin: 0 auto;
      padding: 28px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 58px);
      letter-spacing: -2px;
    }

    .subtitle {
      margin-top: 10px;
      font-size: clamp(18px, 2.2vw, 27px);
      font-weight: 800;
      color: #475569;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      background: white;
      color: #1f2937;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
      transition: transform .15s ease, box-shadow .15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 7px 18px rgba(15, 23, 42, 0.12);
    }

    .print-btn { background: #2563eb; color: white; }
    .clear-btn { background: #ef4444; color: white; }

    .month-switcher {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 22px 0 20px;
    }

    .month-tab {
      min-width: 150px;
      font-size: 18px;
      background: #ffffff;
      border: 2px solid transparent;
    }

    .month-tab.active {
      background: #0f172a;
      color: white;
      border-color: #0f172a;
    }

    .month {
      display: none;
      background: rgba(255,255,255,.96);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 14px 36px rgba(15, 23, 42, 0.11);
      overflow: hidden;
    }

    .month-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 20px;
      align-items: stretch;
    }

    .calendar-area {
      min-width: 0;
    }

    .side-memo {
      background: #f8fafc;
      border: 2px solid #dbe2ea;
      border-radius: 18px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .side-memo-title {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 10px;
      text-align: center;
    }

    .side-memo-editor {
      flex: 1;
      min-height: 720px;
      background: white;
      border-radius: 12px;
      padding: 14px;
      outline: none;
      font-size: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      box-shadow: inset 0 0 0 1px #e2e8f0;
    }

    .side-memo-editor:focus {
      background: #fffdf0;
      box-shadow: inset 0 0 0 2px #facc15;
    }

    .side-memo-editor:empty::before {
      content: "여기에 자유롭게 메모하세요.";
      color: #cbd5e1;
      pointer-events: none;
    }

    .month.active { display: block; }

    .month-title {
      text-align: center;
      font-weight: 900;
      font-size: clamp(34px, 4vw, 50px);
      margin: 2px 0 18px;
    }

    .month-title .en {
      display: block;
      font-size: 14px;
      color: #94a3b8;
      letter-spacing: 3px;
      margin-top: 5px;
    }

    .weekdays, .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .weekday {
      text-align: center;
      padding: 14px 4px;
      font-weight: 900;
      font-size: 18px;
      color: #475569;
      border-bottom: 2px solid #cbd5e1;
      background: #f8fafc;
    }

    .weekday.sun { color: #ef4444; }
    .weekday.sat { color: #2563eb; }

    .day, .blank {
      min-height: 155px;
      border-right: 1px solid #dbe2ea;
      border-bottom: 1px solid #dbe2ea;
      background: #fff;
    }

    .calendar > div:nth-child(7n+1) {
      border-left: 1px solid #dbe2ea;
    }

    .day {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .date-num {
      font-weight: 900;
      font-size: 21px;
      line-height: 1;
    }

    .sun .date-num { color: #ef4444; }
    .sat .date-num { color: #2563eb; }

    .memo {
      flex: 1;
      min-height: 110px;
      padding: 9px;
      border-radius: 10px;
      outline: none;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 16px;
      line-height: 1.5;
      background: #f8fafc;
      cursor: text;
    }

    .memo:focus {
      background: #fff7cc;
      box-shadow: inset 0 0 0 2px #facc15;
    }

    .memo:empty::before {
      content: "일정 입력";
      color: #cbd5e1;
      pointer-events: none;
    }

    .hint {
      margin-top: 18px;
      text-align: center;
      color: #64748b;
      font-size: 14px;
    }

    @media (max-width: 1000px) {
      .month-layout {
        grid-template-columns: 1fr;
      }

      .side-memo-editor {
        min-height: 220px;
      }
    }

    @media (max-width: 760px) {
      .wrap { padding: 10px; }
      .topbar { align-items: flex-start; }
      .month { padding: 9px; border-radius: 16px; }
      .month-tab { min-width: 120px; font-size: 16px; }
      .weekday { font-size: 13px; padding: 10px 2px; }
      .day, .blank { min-height: 105px; }
      .memo { min-height: 70px; font-size: 12px; padding: 5px; }
      .date-num { font-size: 16px; }
    }

    @media print {
      body { background: white; }
      .wrap { max-width: none; padding: 0; }
      .buttons, .month-switcher, .hint { display: none !important; }
      .month { box-shadow: none; border: 1px solid #bbb; }
      .month:not(.active) { display: none !important; }
      .day, .blank { min-height: 130px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>☀️ 여름방학 일정 달력</h1>
        <div class="subtitle">2026 당유찬 여름방학 일정</div>
      </div>

      <div class="buttons">
        <button class="print-btn" onclick="window.print()">🖨️ 현재 달 인쇄</button>
        <button class="clear-btn" onclick="clearAll()">🗑️ 전체 일정 지우기</button>
      </div>
    </div>

    <div class="month-switcher">
      <button class="month-tab active" id="tab-07" onclick="showMonth('07')">7월</button>
      <button class="month-tab" id="tab-08" onclick="showMonth('08')">8월</button>
    </div>

    <section class="month active" id="month-07">
      <div class="month-title">2026년 7월<span class="en">JULY</span></div>
      <div class="month-layout">
        <div class="calendar-area">
          <div class="weekdays">
            <div class="weekday sun">일</div>
            <div class="weekday">월</div>
            <div class="weekday">화</div>
            <div class="weekday">수</div>
            <div class="weekday">목</div>
            <div class="weekday">금</div>
            <div class="weekday sat">토</div>
          </div>
          <div class="calendar" id="cal-2026-07"></div>
        </div>

        <aside class="side-memo">
          <div class="side-memo-title">📝 7월 메모</div>
          <div class="side-memo-editor" id="side-memo-07" contenteditable="true" spellcheck="false"></div>
        </aside>
      </div>
    </section>

    <section class="month" id="month-08">
      <div class="month-title">2026년 8월<span class="en">AUGUST</span></div>
      <div class="month-layout">
        <div class="calendar-area">
          <div class="weekdays">
            <div class="weekday sun">일</div>
            <div class="weekday">월</div>
            <div class="weekday">화</div>
            <div class="weekday">수</div>
            <div class="weekday">목</div>
            <div class="weekday">금</div>
            <div class="weekday sat">토</div>
          </div>
          <div class="calendar" id="cal-2026-08"></div>
        </div>

        <aside class="side-memo">
          <div class="side-memo-title">📝 8월 메모</div>
          <div class="side-memo-editor" id="side-memo-08" contenteditable="true" spellcheck="false"></div>
        </aside>
      </div>
    </section>

    <div class="hint">
      날짜 칸을 클릭해 일정을 입력하세요. 입력한 내용은 현재 브라우저에 자동 저장됩니다.
    </div>
  </div>

  <script>
    const STORAGE_PREFIX = "summer-calendar-2026-";

    function buildCalendar(year, month) {
      const monthText = String(month).padStart(2, "0");
      const container = document.getElementById(`cal-${year}-${monthText}`);
      const firstDay = new Date(year, month - 1, 1).getDay();
      const lastDate = new Date(year, month, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        const blank = document.createElement("div");
        blank.className = "blank";
        container.appendChild(blank);
      }

      for (let day = 1; day <= lastDate; day++) {
        const date = new Date(year, month - 1, day);
        const dow = date.getDay();
        const key = `${STORAGE_PREFIX}${year}-${monthText}-${String(day).padStart(2, "0")}`;

        const cell = document.createElement("div");
        cell.className = "day" + (dow === 0 ? " sun" : dow === 6 ? " sat" : "");

        const num = document.createElement("div");
        num.className = "date-num";
        num.textContent = day;

        const memo = document.createElement("div");
        memo.className = "memo";
        memo.contentEditable = "true";
        memo.spellcheck = false;
        memo.dataset.key = key;
        memo.innerHTML = localStorage.getItem(key) || "";

        memo.addEventListener("input", () => {
          localStorage.setItem(key, memo.innerHTML);
        });

        cell.appendChild(num);
        cell.appendChild(memo);
        container.appendChild(cell);
      }

      const totalCells = firstDay + lastDate;
      const remaining = (7 - (totalCells % 7)) % 7;

      for (let i = 0; i < remaining; i++) {
        const blank = document.createElement("div");
        blank.className = "blank";
        container.appendChild(blank);
      }
    }

    function showMonth(month) {
      document.querySelectorAll(".month").forEach(el => el.classList.remove("active"));
      document.querySelectorAll(".month-tab").forEach(el => el.classList.remove("active"));

      document.getElementById(`month-${month}`).classList.add("active");
      document.getElementById(`tab-${month}`).classList.add("active");
    }

    function clearAll() {
      const ok = confirm("2026년 7월·8월에 입력한 모든 일정을 지울까요?");
      if (!ok) return;

      Object.keys(localStorage)
        .filter(key => key.startsWith(STORAGE_PREFIX))
        .forEach(key => localStorage.removeItem(key));

      document.querySelectorAll(".memo").forEach(memo => memo.innerHTML = "");
    }

    function initSideMemo(month) {
      const editor = document.getElementById(`side-memo-${month}`);
      const key = `${STORAGE_PREFIX}side-memo-${month}`;
      editor.innerHTML = localStorage.getItem(key) || "";

      editor.addEventListener("input", () => {
        localStorage.setItem(key, editor.innerHTML);
      });
    }

    buildCalendar(2026, 7);
    buildCalendar(2026, 8);
    initSideMemo("07");
    initSideMemo("08");
  </script>
</body>
</html>
