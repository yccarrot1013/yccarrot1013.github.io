<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>QR 스캐너</title>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background: #f3f6fb;
      color: #111827;
      text-align: center;
    }

    header {
      padding: 16px 10px 8px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 800;
    }

    main {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 8px;
    }

    #reader {
      width: 100%;
      height: 70vh;
      min-height: 430px;
      background: #000;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
    }

    #reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      background: #000 !important;
    }

    #reader__dashboard {
      display: none !important;
    }

    #reader__scan_region {
      width: 100% !important;
      height: 100% !important;
    }

    #reader__scan_region img {
      display: none !important;
    }

    select {
      width: 100%;
      margin-top: 10px;
      padding: 13px;
      border-radius: 13px;
      border: 1px solid #d1d5db;
      background: white;
      font-size: 15px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 15px 10px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    #startBtn {
      background: #2563eb;
      color: white;
    }

    #stopBtn {
      background: #e5e7eb;
      color: #111827;
    }

    #permissionBtn {
      width: 100%;
      margin-top: 8px;
      background: #111827;
      color: white;
    }

    .result-box {
      margin-top: 10px;
      padding: 14px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 5px 16px rgba(0,0,0,0.08);
      text-align: left;
      word-break: break-all;
    }

    .label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 7px;
    }

    #result {
      font-size: 17px;
      font-weight: 800;
      color: #111827;
      line-height: 1.45;
    }

    #openLink,
    #copyBtn {
      display: none;
      width: 100%;
      margin-top: 9px;
      text-decoration: none;
      text-align: center;
      border-radius: 13px;
      padding: 13px;
      font-weight: 800;
      font-size: 15px;
    }

    #openLink {
      background: #16a34a;
      color: white;
    }

    #copyBtn {
      background: #facc15;
      color: #111827;
    }

    .tip {
      margin: 10px 0 4px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      main {
        padding: 6px;
      }

      #reader {
        height: 72vh;
        min-height: 440px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>QR 스캐너</h1>
  </header>

  <main>
    <div id="reader"></div>

    <select id="cameraSelect">
      <option value="">카메라 자동 선택</option>
    </select>

    <div class="buttons">
      <button id="startBtn">스캔 시작</button>
      <button id="stopBtn">스캔 중지</button>
    </div>

    <button id="permissionBtn">카메라 권한 설정하기</button>

    <div class="result-box">
      <div class="label">스캔 결과</div>
      <div id="result">스캔 시작을 눌러주세요.</div>
      <a id="openLink" target="_blank" rel="noopener noreferrer">링크 바로 열기</a>
      <button id="copyBtn">결과 복사</button>
    </div>

    <div class="tip">
      카메라 권한을 허용해야 작동합니다.
    </div>
  </main>

  <script>
    const readerId = "reader";
    const qrScanner = new Html5Qrcode(readerId, { verbose: false });

    const cameraSelect = document.getElementById("cameraSelect");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const permissionBtn = document.getElementById("permissionBtn");
    const resultEl = document.getElementById("result");
    const openLink = document.getElementById("openLink");
    const copyBtn = document.getElementById("copyBtn");

    let isScanning = false;
    let lastResult = "";
    let detected = false;

    function isUrl(text) {
      try {
        const url = new URL(text);
        return url.protocol === "http:" || url.protocol === "https:";
      } catch {
        return false;
      }
    }

    function showResult(text) {
      lastResult = text;
      resultEl.textContent = text;
      copyBtn.style.display = "block";

      if (isUrl(text)) {
        openLink.href = text;
        openLink.style.display = "block";
      } else {
        openLink.style.display = "none";
      }

      if (navigator.vibrate) {
        navigator.vibrate(80);
      }
    }

    function getScanConfig() {
      const config = {
        fps: 30,
        disableFlip: true,

        qrbox: function(viewfinderWidth, viewfinderHeight) {
          return {
            width: Math.floor(viewfinderWidth * 0.96),
            height: Math.floor(viewfinderHeight * 0.96)
          };
        },

        experimentalFeatures: {
          useBarCodeDetectorIfSupported: true
        }
      };

      if (typeof Html5QrcodeSupportedFormats !== "undefined") {
        config.formatsToSupport = [
          Html5QrcodeSupportedFormats.QR_CODE
        ];
      }

      return config;
    }

    function getCameraConfig() {
      const selectedCameraId = cameraSelect.value;

      if (selectedCameraId) {
        return {
          deviceId: { exact: selectedCameraId },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        };
      }

      return {
        facingMode: { ideal: "environment" },
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      };
    }

    async function requestCameraPermission() {
      try {
        resultEl.textContent = "카메라 권한을 요청하는 중입니다...";

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" }
          },
          audio: false
        });

        stream.getTracks().forEach(track => track.stop());

        resultEl.textContent = "카메라 권한이 허용되었습니다.";
        await loadCameras();
      } catch (error) {
        resultEl.textContent = "카메라 권한이 차단되었습니다. 브라우저 설정에서 카메라 권한을 허용해주세요.";
        alert(
          "카메라 권한이 차단되었습니다.\n\n" +
          "iPhone: 설정 > Safari > 카메라 > 허용\n" +
          "Android Chrome: 주소창 왼쪽 자물쇠 > 권한 > 카메라 허용"
        );
      }
    }

    async function loadCameras() {
      try {
        const cameras = await Html5Qrcode.getCameras();

        cameraSelect.innerHTML = "";

        if (!cameras || cameras.length === 0) {
          cameraSelect.innerHTML = "<option value=''>카메라를 찾을 수 없음</option>";
          resultEl.textContent = "카메라를 찾을 수 없습니다.";
          return;
        }

        let backCameraIndex = cameras.length - 1;

        cameras.forEach((camera, index) => {
          const option = document.createElement("option");
          option.value = camera.id;

          const label = camera.label || `카메라 ${index + 1}`;
          option.textContent = label;

          const lower = label.toLowerCase();

          if (
            lower.includes("back") ||
            lower.includes("rear") ||
            lower.includes("environment") ||
            lower.includes("후면")
          ) {
            backCameraIndex = index;
          }

          cameraSelect.appendChild(option);
        });

        cameraSelect.selectedIndex = backCameraIndex;
      } catch (error) {
        resultEl.textContent = "카메라 권한 설정하기를 눌러주세요.";
      }
    }

    async function startScanner() {
      if (isScanning) return;

      detected = false;
      lastResult = "";

      openLink.style.display = "none";
      copyBtn.style.display = "none";

      resultEl.textContent = "카메라를 여는 중입니다...";
      startBtn.disabled = true;

      try {
        await qrScanner.start(
          getCameraConfig(),
          getScanConfig(),
          async function(decodedText) {
            if (detected) return;

            detected = true;
            showResult(decodedText);

            await stopScanner(false);
          },
          function() {}
        );

        isScanning = true;
        resultEl.textContent = "QR코드를 화면 안에 넣어주세요.";
      } catch (error) {
        resultEl.textContent = "카메라 실행 실패. 카메라 권한을 확인해주세요.";
      }

      startBtn.disabled = false;
    }

    async function stopScanner(showStopMessage = true) {
      if (!isScanning) return;

      try {
        await qrScanner.stop();
      } catch (error) {
        console.error(error);
      }

      isScanning = false;

      if (showStopMessage && !lastResult) {
        resultEl.textContent = "스캔이 중지되었습니다.";
      }
    }

    startBtn.addEventListener("click", startScanner);

    stopBtn.addEventListener("click", async () => {
      await stopScanner(true);
    });

    permissionBtn.addEventListener("click", requestCameraPermission);

    copyBtn.addEventListener("click", async () => {
      if (!lastResult) return;

      try {
        await navigator.clipboard.writeText(lastResult);
        copyBtn.textContent = "복사 완료!";
        setTimeout(() => {
          copyBtn.textContent = "결과 복사";
        }, 1200);
      } catch {
        alert("복사에 실패했습니다.");
      }
    });

    window.addEventListener("load", loadCameras);
  </script>
</body>
</html>
