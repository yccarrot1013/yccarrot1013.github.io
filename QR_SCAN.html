<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <title>초고속 QR 코드 스캐너</title>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background: #f3f6fb;
      color: #111827;
    }

    body {
      text-align: center;
    }

    header {
      padding: 14px 10px 6px;
    }

    h1 {
      margin: 0;
      font-size: 25px;
      font-weight: 800;
    }

    .sub {
      margin-top: 6px;
      font-size: 13px;
      color: #6b7280;
    }

    main {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 8px;
    }

    #reader {
      width: 100%;
      height: 72vh;
      min-height: 430px;
      max-height: 850px;
      background: #000;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
    }

    #reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain !important;
      background: #000 !important;
    }

    #reader__scan_region {
      width: 100% !important;
      height: 100% !important;
    }

    #reader__scan_region img {
      display: none !important;
    }

    #reader__dashboard {
      display: none !important;
    }

    #reader__scan_region > video {
      border-radius: 18px;
    }

    .control-box {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    select {
      width: 100%;
      padding: 13px;
      border-radius: 13px;
      border: 1px solid #d1d5db;
      background: white;
      font-size: 15px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 15px 10px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    #startBtn {
      background: #2563eb;
      color: white;
    }

    #stopBtn {
      background: #e5e7eb;
      color: #111827;
    }

    #startBtn:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    .result-box {
      margin-top: 10px;
      padding: 14px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 5px 16px rgba(0,0,0,0.08);
      text-align: left;
      word-break: break-all;
    }

    .label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 7px;
    }

    #result {
      font-size: 17px;
      font-weight: 800;
      color: #111827;
      line-height: 1.45;
    }

    #openLink,
    #copyBtn {
      display: none;
      width: 100%;
      margin-top: 9px;
      text-decoration: none;
      text-align: center;
      border-radius: 13px;
      padding: 13px;
      font-weight: 800;
      font-size: 15px;
    }

    #openLink {
      background: #16a34a;
      color: white;
    }

    #copyBtn {
      background: #facc15;
      color: #111827;
    }

    .tip {
      margin: 10px 0 4px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      header {
        padding-top: 10px;
      }

      h1 {
        font-size: 23px;
      }

      main {
        padding: 6px;
      }

      #reader {
        height: 74vh;
        min-height: 440px;
        border-radius: 16px;
      }

      button {
        padding: 14px 8px;
      }
    }

    @media (orientation: landscape) {
      #reader {
        height: 82vh;
        min-height: 320px;
      }

      header {
        display: none;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>초고속 QR 코드 스캐너</h1>
    <div class="sub">큰 QR도 잘 보이도록 카메라 화면을 크게 만들었습니다</div>
  </header>

  <main>
    <div id="reader"></div>

    <div class="control-box">
      <select id="cameraSelect">
        <option value="">카메라 자동 선택</option>
      </select>

      <div class="buttons">
        <button id="startBtn">스캔 시작</button>
        <button id="stopBtn">스캔 중지</button>
      </div>
    </div>

    <div class="result-box">
      <div class="label">스캔 결과</div>
      <div id="result">스캔 시작을 눌러주세요.</div>
      <a id="openLink" target="_blank" rel="noopener noreferrer">링크 바로 열기</a>
      <button id="copyBtn">결과 복사</button>
    </div>

    <div class="tip">
      QR코드의 네모난 모서리 표시 3개가 화면 안에 들어와야 인식됩니다.<br>
      너무 가까우면 살짝 뒤로 물러나세요.
    </div>
  </main>

  <script>
    const readerId = "reader";
    const qrScanner = new Html5Qrcode(readerId, { verbose: false });

    const cameraSelect = document.getElementById("cameraSelect");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const resultEl = document.getElementById("result");
    const openLink = document.getElementById("openLink");
    const copyBtn = document.getElementById("copyBtn");

    let isScanning = false;
    let alreadyDetected = false;
    let lastResult = "";

    function isUrl(text) {
      try {
        const url = new URL(text);
        return url.protocol === "http:" || url.protocol === "https:";
      } catch {
        return false;
      }
    }

    function showResult(text) {
      lastResult = text;
      resultEl.textContent = text;
      copyBtn.style.display = "block";

      if (isUrl(text)) {
        openLink.href = text;
        openLink.style.display = "block";
      } else {
        openLink.style.display = "none";
      }
    }

    function vibrateOnce() {
      if (navigator.vibrate) {
        navigator.vibrate(80);
      }
    }

    function getFastConfig() {
      const config = {
        fps: 30,
        disableFlip: true,
        experimentalFeatures: {
          useBarCodeDetectorIfSupported: true
        }
      };

      if (typeof Html5QrcodeSupportedFormats !== "undefined") {
        config.formatsToSupport = [Html5QrcodeSupportedFormats.QR_CODE];
      }

      /*
        qrbox를 일부러 넣지 않았습니다.
        이유: qrbox를 넣으면 가운데 작은 영역만 읽습니다.
        큰 QR코드는 화면 전체를 읽는 방식이 더 유리합니다.
      */

      return config;
    }

    function getFallbackConfig() {
      return {
        fps: 15,
        disableFlip: true
      };
    }

    function getSelectedCameraConfig() {
      const cameraId = cameraSelect.value;

      if (cameraId) {
        return {
          deviceId: { exact: cameraId },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        };
      }

      return {
        facingMode: { ideal: "environment" },
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      };
    }

    async function loadCameras() {
      try {
        const cameras = await Html5Qrcode.getCameras();

        cameraSelect.innerHTML = "";

        if (!cameras || cameras.length === 0) {
          cameraSelect.innerHTML = "<option value=''>카메라 자동 선택</option>";
          resultEl.textContent = "카메라를 찾지 못했습니다. 권한을 허용한 뒤 새로고침하세요.";
          return;
        }

        let backCameraIndex = cameras.length - 1;

        cameras.forEach((camera, index) => {
          const option = document.createElement("option");
          option.value = camera.id;

          const label = camera.label || `카메라 ${index + 1}`;
          option.textContent = label;

          const lowerLabel = label.toLowerCase();

          if (
            lowerLabel.includes("back") ||
            lowerLabel.includes("rear") ||
            lowerLabel.includes("environment") ||
            lowerLabel.includes("후면")
          ) {
            backCameraIndex = index;
          }

          cameraSelect.appendChild(option);
        });

        cameraSelect.selectedIndex = backCameraIndex;
        resultEl.textContent = "카메라 준비 완료. 스캔 시작을 눌러주세요.";
      } catch (error) {
        cameraSelect.innerHTML = "<option value=''>카메라 자동 선택</option>";
        resultEl.textContent = "스캔 시작을 누른 뒤 카메라 권한을 허용하세요.";
      }
    }

    async function startScanner() {
      if (isScanning) return;

      alreadyDetected = false;
      startBtn.disabled = true;
      resultEl.textContent = "카메라를 여는 중입니다...";

      openLink.style.display = "none";
      copyBtn.style.display = "none";

      try {
        await qrScanner.start(
          getSelectedCameraConfig(),
          getFastConfig(),
          async function(decodedText) {
            if (alreadyDetected) return;

            alreadyDetected = true;
            showResult(decodedText);
            vibrateOnce();

            await stopScanner("인식 완료!");
          },
          function() {
            // QR이 없는 프레임은 무시합니다. 그래야 속도가 빠릅니다.
          }
        );

        isScanning = true;

        if (!alreadyDetected) {
          resultEl.textContent = "QR코드를 화면 안에 크게 맞춰주세요.";
        }
      } catch (firstError) {
        try {
          await qrScanner.start(
            { facingMode: "environment" },
            getFallbackConfig(),
            async function(decodedText) {
              if (alreadyDetected) return;

              alreadyDetected = true;
              showResult(decodedText);
              vibrateOnce();

              await stopScanner("인식 완료!");
            },
            function() {}
          );

          isScanning = true;

          if (!alreadyDetected) {
            resultEl.textContent = "QR코드를 화면 안에 크게 맞춰주세요.";
          }
        } catch (secondError) {
          resultEl.textContent = "카메라 실행 실패. Safari/Chrome에서 열고 카메라 권한을 허용하세요.";
          console.error(secondError);
        }
      }

      startBtn.disabled = false;
    }

    async function stopScanner(message = "스캔이 중지되었습니다.") {
      if (!isScanning) return;

      try {
        await qrScanner.stop();
      } catch (error) {
        console.error(error);
      }

      isScanning = false;

      if (!lastResult) {
        resultEl.textContent = message;
      }
    }

    copyBtn.addEventListener("click", async () => {
      if (!lastResult) return;

      try {
        await navigator.clipboard.writeText(lastResult);
        copyBtn.textContent = "복사 완료!";
        setTimeout(() => {
          copyBtn.textContent = "결과 복사";
        }, 1200);
      } catch {
        alert("복사에 실패했습니다.");
      }
    });

    startBtn.addEventListener("click", startScanner);

    stopBtn.addEventListener("click", async () => {
      await stopScanner("스캔이 중지되었습니다.");
    });

    window.addEventListener("load", loadCameras);
  </script>
</body>
</html>
