<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>QR 스캐너</title>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background: #f3f6fb;
      color: #111827;
      text-align: center;
    }

    header {
      padding: 16px 10px 8px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 800;
    }

    main {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 8px;
    }

    #cameraBox {
      position: relative;
      width: 100%;
      height: 70vh;
      min-height: 430px;
      background: #000;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    #scanGuide {
      position: absolute;
      inset: 3%;
      border: 3px solid rgba(255,255,255,0.85);
      border-radius: 16px;
      pointer-events: none;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 15px 10px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    #startBtn {
      background: #2563eb;
      color: white;
    }

    #stopBtn {
      background: #e5e7eb;
      color: #111827;
    }

    #permissionBtn {
      width: 100%;
      margin-top: 8px;
      background: #111827;
      color: white;
    }

    .result-box {
      margin-top: 10px;
      padding: 14px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 5px 16px rgba(0,0,0,0.08);
      text-align: left;
      word-break: break-all;
    }

    .label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 7px;
    }

    #result {
      font-size: 17px;
      font-weight: 800;
      color: #111827;
      line-height: 1.45;
    }

    #openLink,
    #copyBtn {
      display: none;
      width: 100%;
      margin-top: 9px;
      text-decoration: none;
      text-align: center;
      border-radius: 13px;
      padding: 13px;
      font-weight: 800;
      font-size: 15px;
    }

    #openLink {
      background: #16a34a;
      color: white;
    }

    #copyBtn {
      background: #facc15;
      color: #111827;
    }

    .tip {
      margin: 10px 0 4px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
    }

    canvas {
      display: none;
    }

    @media (max-width: 480px) {
      main {
        padding: 6px;
      }

      #cameraBox {
        height: 72vh;
        min-height: 440px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>QR 스캐너</h1>
  </header>

  <main>
    <div id="cameraBox">
      <video id="video" autoplay muted playsinline></video>
      <div id="scanGuide"></div>
    </div>

    <div class="buttons">
      <button id="startBtn">스캔 시작</button>
      <button id="stopBtn">스캔 중지</button>
    </div>

    <button id="permissionBtn">카메라 권한 설정하기</button>

    <div class="result-box">
      <div class="label">스캔 결과</div>
      <div id="result">스캔 시작을 눌러주세요.</div>
      <a id="openLink" target="_blank" rel="noopener noreferrer">링크 바로 열기</a>
      <button id="copyBtn">결과 복사</button>
    </div>

    <div class="tip">
      카메라 권한을 허용해야 작동합니다.
    </div>

    <canvas id="canvas"></canvas>
  </main>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const permissionBtn = document.getElementById("permissionBtn");
    const resultEl = document.getElementById("result");
    const openLink = document.getElementById("openLink");
    const copyBtn = document.getElementById("copyBtn");

    let stream = null;
    let scanning = false;
    let lastResult = "";
    let lastScanTime = 0;

    function isUrl(text) {
      try {
        const url = new URL(text);
        return url.protocol === "http:" || url.protocol === "https:";
      } catch {
        return false;
      }
    }

    function showResult(text) {
      lastResult = text;
      resultEl.textContent = text;
      copyBtn.style.display = "block";

      if (isUrl(text)) {
        openLink.href = text;
        openLink.style.display = "block";
      } else {
        openLink.style.display = "none";
      }

      if (navigator.vibrate) {
        navigator.vibrate(80);
      }
    }

    async function requestCameraPermission() {
      try {
        resultEl.textContent = "카메라 권한을 요청하는 중입니다...";

        const testStream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });

        testStream.getTracks().forEach(track => track.stop());

        resultEl.textContent = "카메라 권한이 허용되었습니다. 스캔 시작을 눌러주세요.";
      } catch (error) {
        resultEl.textContent = "카메라 권한이 차단되어 있습니다.";

        alert(
          "카메라 권한을 허용해주세요.\n\n" +
          "iPhone Safari: 주소창 왼쪽 가가/AA 또는 설정 > Safari > 카메라 > 허용\n" +
          "Android Chrome: 주소창 왼쪽 자물쇠 > 권한 > 카메라 허용"
        );
      }
    }

    async function startCamera() {
      if (scanning) return;

      openLink.style.display = "none";
      copyBtn.style.display = "none";
      lastResult = "";

      resultEl.textContent = "카메라를 여는 중입니다...";
      startBtn.disabled = true;

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });

        video.srcObject = stream;

        await video.play();

        scanning = true;
        resultEl.textContent = "QR코드를 화면 안에 넣어주세요.";

        requestAnimationFrame(scanLoop);
      } catch (error) {
        resultEl.textContent = "카메라 실행 실패: " + error.name;

        alert(
          "카메라가 열리지 않았습니다.\n\n" +
          "1. 이 페이지가 https://yccarrot1013.github.io 주소인지 확인\n" +
          "2. 카카오톡/네이버앱 말고 Safari 또는 Chrome에서 열기\n" +
          "3. 다른 앱이 카메라를 사용 중이면 종료\n" +
          "4. 브라우저 카메라 권한 허용 확인"
        );
      }

      startBtn.disabled = false;
    }

    function scanLoop(time) {
      if (!scanning) return;

      // 너무 과하게 돌리면 휴대폰이 느려질 수 있어서 약 20fps 정도로 스캔
      if (time - lastScanTime < 50) {
        requestAnimationFrame(scanLoop);
        return;
      }

      lastScanTime = time;

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        const videoWidth = video.videoWidth;
        const videoHeight = video.videoHeight;

        if (videoWidth > 0 && videoHeight > 0) {
          canvas.width = videoWidth;
          canvas.height = videoHeight;

          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

          const code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: "dontInvert"
          });

          if (code && code.data) {
            showResult(code.data);
            stopCamera(false);
            return;
          }
        }
      }

      requestAnimationFrame(scanLoop);
    }

    function stopCamera(showMessage = true) {
      scanning = false;

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      video.srcObject = null;

      if (showMessage && !lastResult) {
        resultEl.textContent = "스캔이 중지되었습니다.";
      }
    }

    startBtn.addEventListener("click", startCamera);
    stopBtn.addEventListener("click", () => stopCamera(true));
    permissionBtn.addEventListener("click", requestCameraPermission);

    copyBtn.addEventListener("click", async () => {
      if (!lastResult) return;

      try {
        await navigator.clipboard.writeText(lastResult);
        copyBtn.textContent = "복사 완료!";
        setTimeout(() => {
          copyBtn.textContent = "결과 복사";
        }, 1200);
      } catch {
        alert("복사에 실패했습니다.");
      }
    });
  </script>
</body>
</html>
